name: Sonar

on:
  pull_request:
    branches: [ main,master ]
  push:
    branches: [ main,master ]

jobs:
  sonar:
    uses: TransactionProcessing/org-ci-workflows/.github/workflows/sonar.yml@main
    with:
      organisation: transactionprocessing
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
